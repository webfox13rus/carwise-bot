name: Deploy to Yandex Cloud

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Deploy function
        env:
          YC_TOKEN: ${{ secrets.YC_TOKEN }}
          YC_FUNCTION_ID: ${{ secrets.YC_FUNCTION_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
          FEEDBACK_CHAT_ID: ${{ secrets.FEEDBACK_CHAT_ID }}
          GIGACHAT_AUTH_KEY: ${{ secrets.GIGACHAT_AUTH_KEY }}
          PREMIUM_PRICE_MONTH: ${{ secrets.PREMIUM_PRICE_MONTH }}
          PREMIUM_PRICE_YEAR: ${{ secrets.PREMIUM_PRICE_YEAR }}
        run: |
          # Создаём ZIP-архив с кодом
          zip -r function.zip . -x "*.git*" "__pycache__/*" "*.pyc" ".github/*"

          # Деплоим функцию (каждую переменную передаём отдельным флагом --environment)
          yc serverless function version create \
            --function-id $YC_FUNCTION_ID \
            --runtime python311 \
            --entrypoint main.main \
            --memory 256m \
            --execution-timeout 30s \
            --environment BOT_TOKEN="$BOT_TOKEN" \
            --environment DATABASE_URL="$DATABASE_URL" \
            --environment ADMIN_IDS="$ADMIN_IDS" \
            --environment FEEDBACK_CHAT_ID="$FEEDBACK_CHAT_ID" \
            --environment GIGACHAT_AUTH_KEY="$GIGACHAT_AUTH_KEY" \
            --environment PREMIUM_PRICE_MONTH="$PREMIUM_PRICE_MONTH" \
            --environment PREMIUM_PRICE_YEAR="$PREMIUM_PRICE_YEAR" \
            --source-path ./function.zip
