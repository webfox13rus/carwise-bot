name: Deploy to Yandex Cloud

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Deploy function
        env:
          YC_TOKEN: ${{ secrets.YC_TOKEN }}
          YC_FUNCTION_ID: ${{ secrets.YC_FUNCTION_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
          FEEDBACK_CHAT_ID: ${{ secrets.FEEDBACK_CHAT_ID }}
          GIGACHAT_AUTH_KEY: ${{ secrets.GIGACHAT_AUTH_KEY }}
          PREMIUM_PRICE_MONTH: ${{ secrets.PREMIUM_PRICE_MONTH }}
          PREMIUM_PRICE_YEAR: ${{ secrets.PREMIUM_PRICE_YEAR }}
        run: |
          # Собираем переменные окружения в нужный формат
          ENV_VARS=""
          for var in BOT_TOKEN DATABASE_URL ADMIN_IDS FEEDBACK_CHAT_ID GIGACHAT_AUTH_KEY PREMIUM_PRICE_MONTH PREMIUM_PRICE_YEAR; do
            value="${!var}"
            # Экранируем кавычки, если есть
            value=$(echo "$value" | sed 's/"/\\"/g')
            ENV_VARS="$ENV_VARS $var=\"$value\""
          done
          ENV_VARS=$(echo "$ENV_VARS" | sed 's/^ //')  # убираем лишний пробел в начале

          # Создаём ZIP-архив с кодом
          zip -r function.zip . -x "*.git*" "__pycache__/*" "*.pyc"

          # Деплоим функцию (если версия создаётся впервые, может потребоваться другая команда)
          yc serverless function version create \
            --function-id $YC_FUNCTION_ID \
            --runtime python311 \
            --entrypoint main.main \
            --memory 256m \
            --execution-timeout 30s \
            --environment "$ENV_VARS" \
            --source-path ./function.zip
